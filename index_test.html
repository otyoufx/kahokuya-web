<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>山形肉そば 河北や｜公式サイト（テスト版）</title>

  <!-- ★ ここは index.html と同じ CSS（省略せずそのまま） -->
  <style>
    /* ここはあなたの index.html の CSS をそのまま貼る（省略） */
  </style>

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9948349926149649"
     crossorigin="anonymous"></script>
</head>

<body>
  <div class="overlay">

    <h1>山形肉そば 河北や（テスト版）</h1>
    <div class="tagline">山形県河北町のご当地そばを戸田で。</div>

    <!-- 営業状況 -->
    <div class="card small-small-card" style="text-align:center;">
      <p id="now-time" style="font-size:1.1rem; font-weight:700;">只今の日時：</p>
      <p id="now-status" style="font-size:1.1rem; font-weight:700;">営業状況を判定中…</p>
    </div>

    <!-- ▼ 以下、あなたの index.html と完全同じ（省略せず貼る） -->
    <!-- （ここにあなたの index.html の本文をそのまま入れる） -->
    <!-- ※ schedule-table の構造はそのまま使う -->

    <!-- ★ 重要：現行の updateTimeAndStatus() ロジックは削除する -->
    <!-- ★ 代わりに main_test.js を読み込む -->

    <!-- ▼ 新仕様の営業状況ロジック -->
    <script src="js/main_test.js"></script>

    <!-- ▼ 設定反映（get-settings_test） -->
    <script>
      async function loadSettingsTest() {
        try {
          const res = await fetch("/.netlify/functions/get-settings_test", { cache: "no-store" });
          if (!res.ok) throw new Error("get-settings_test failed");

          const data = await res.json();

          // main_test.js に渡す
          window.__settings = data;

          // 営業状況を更新
          updateBusinessStatus();

          // 営業日・営業時間テーブルを更新
          updateScheduleTable();

          // お知らせ
          const noticeArea = document.getElementById("notice-area");
          if (data.notice.enabled) {
            noticeArea.innerHTML = `
              <strong>${data.notice.title}</strong><br>
              <span>${data.notice.body}</span>
            `;
          } else {
            noticeArea.textContent = "（お知らせはありません）";
          }

        } catch (err) {
          console.error("設定の読み込みに失敗:", err);
          document.getElementById("now-status").textContent = "設定の読み込みに失敗しました";
        }
      }

      loadSettingsTest();
      setInterval(updateBusinessStatus, 60000);
    </script>

    <!-- ▼ メニュータブ切り替え（現行のまま） -->
    <script>
      document.querySelectorAll('.menu-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          document.querySelectorAll('.menu-tab').forEach(t => t.classList.remove('active'));
          tab.classList.add('active');

          const target = tab.dataset.target;
          document.querySelectorAll('.menu-content').forEach(c => {
            c.style.display = (c.id === target) ? 'block' : 'none';
          });
        });
      });
    </script>

    <!-- ▼ 広告（現行のまま） -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9948349926149649"
       crossorigin="anonymous"></script>
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-9948349926149649"
         data-ad-slot="8299677906"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>
      (adsbygoogle = window.adsbygoogle || []).push({});
    </script>

  </div>
</body>
</html>
