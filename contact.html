<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>お問い合わせ｜山形肉そば 河北や</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Segoe UI", "YuGothic", "Yu Gothic", "Meiryo", sans-serif;
      background: #fff;
      padding: 20px;
      max-width: 640px;
      margin: 0 auto;
      line-height: 1.7;
      font-size: 0.9rem;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 10px;
      text-align: center;
    }
    p {
      margin-bottom: 12px;
    }
    a {
      color: #0066cc;
    }
  </style>
</head>
<body>

<h1>お問い合わせ</h1>

<p>
当店へのお問い合わせは、以下のメールアドレスよりお願いいたします。<br>
クリックするとメールアプリが開きます。
</p>

<p id="mail"></p>

<script>
  // メールアドレスをJSで生成（スパム対策）
  const user = "bootgm";          // ← ここを好きなユーザー名に
  const domain = "gmail.com"; // ← ここをあなたのドメインに
  const address = `${user}@${domain}`;

  document.getElementById("mail").innerHTML =
    `<a href="mailto:${address}">こちら</a>`;
</script>

<p style="margin-top:20px;">
<a href="/privacy.html">プライバシーポリシーはこちら</a>
</p>

</body>
</html>
