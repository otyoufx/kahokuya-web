<!-- ▼▼▼ 設定ページ UI ▼▼▼ -->
<div class="settings-container">

  <h2>🔧 サイト設定（管理用）</h2>

  <!-- 営業モード -->
  <div class="settings-block">
    <h3>営業モード</h3>

    <label>
      <input type="radio" name="forceClosed" value="open" checked>
      通常判定（曜日と時間で自動判定）
    </label><br>

    <label>
      <input type="radio" name="forceClosed" value="closed">
      強制的に「休み」にする
    </label>
  </div>

  <!-- 営業日・営業時間 -->
  <div class="settings-block">
    <h3>営業日・営業時間（◯✕編集）</h3>

    <table class="settings-table">
      <tr>
        <th></th>
        <th>月</th>
        <th>火</th>
        <th>水</th>
        <th>木</th>
        <th>金</th>
        <th>土</th>
        <th>日</th>
      </tr>

      <tr>
        <td>昼</td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
      </tr>

      <tr>
        <td>夜</td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
        <td><select><option>◯</option><option>✕</option></select></td>
      </tr>
    </table>
  </div>

  <!-- お知らせ -->
  <div class="settings-block">
    <h3>お知らせ（自由書き込み）</h3>

    <div class="notice-card">
      <label class="notice-toggle">
        <input type="checkbox" id="noticeEnabled">
        お知らせを表示する
      </label>

      <div class="notice-fields">
        <label class="notice-label">タイトル</label>
        <input type="text" class="notice-title" placeholder="例：GW期間の営業について">

        <label class="notice-label">本文</label>
        <textarea class="notice-body" rows="4" placeholder="例：GW期間中は営業時間が変更になります。"></textarea>
      </div>
    </div>
  </div>

  <!-- 保存ボタン -->
  <button class="settings-save-btn">保存</button>

  <script src="js/settings.js"></script>
</div>

<!-- ▼▼▼ CSS ▼▼▼ -->
<style>
.notice-card {
  background: #f8f9fa;
  padding: 15px;
  border-radius: 8px;
  border: 1px solid #ddd;
  margin-top: 10px;
}

.notice-toggle {
  display: flex;
  align-items: center;
  font-weight: bold;
  margin-bottom: 12px;
}

.notice-toggle input {
  margin-right: 8px;
}

.notice-fields {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.notice-label {
  font-size: 14px;
  font-weight: bold;
  margin-bottom: -4px;
}

.notice-title,
.notice-body {
  width: 100%;
  padding: 8px;
  border-radius: 6px;
  border: 1px solid #ccc;
  background: #fff;
}
</style>
